# الفنان ERP — نشر مجاني مؤقت على Render (Blueprint)
#
# الاستخدام:
#   1. ادفع هذا الملف إلى GitHub، ثم في Render: New > Blueprint > اختر المستودع.
#   2. Render سينشئ قاعدة بيانات + خدمة API (Docker) + موقع الويب (Static) تلقائيًا.
#   3. بعد أول Deploy، شغّل الـ seed مرة واحدة محليًا على قاعدة بيانات Render
#      (راجع External Database URL من تبويب alfannan-db في لوحة Render):
#        DATABASE_URL="<External URL>" npm run seed --workspace=apps/api
#   4. الدخول التجريبي: admin@store.com / 123456
#
# ملاحظة: قاعدة البيانات المجانية على Render تُحذف بعد 90 يومًا — مناسبة لتجربة مؤقتة فقط.

databases:
  - name: alfannan-db
    databaseName: alfannan
    user: alfannan
    plan: free

services:
  - type: web
    name: alfannan-api
    runtime: docker
    dockerfilePath: ./deploy/api.Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: alfannan-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "4000"
      - key: CORS_ORIGIN
        value: https://alfannan-web.onrender.com

  - type: web
    name: alfannan-web
    runtime: static
    buildCommand: npm ci && npm run build --workspace=apps/web
    staticPublishPath: ./apps/web/dist
    envVars:
      - key: VITE_API_URL
        value: https://alfannan-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
